        object:
    climate_entity_id:
      name: Klima-Geraet
      description: Alternativ ein einzelnes Climate-Entity
      selector:
        entity:
          filter:
            integration: cul_max
            domain: climate
    climate_entity_ids:
      name: Klima-Geraete
      description: Alternativ eine Liste beteiligter Climate-Entities
      selector:
        entity:
          multiple: true
          filter:
            integration: cul_max
            domain: climate
    climate_device_name:
      name: Klima-Geraetename
      description: Alternativ ein einzelner gespeicherter MAX!-Geraetename
      selector:
        text:
    climate_device_names:
      name: Klima-Geraetenamen
      description: Alternativ eine Liste gespeicherter MAX!-Geraetenamen
      selector:
        object:
    window_address:
      name: Fensterkontakt-Adresse
      description: Einzelne vorhandene MAX!-Fensterkontakt-Adresse
      selector:
        text:
    window_addresses:
      name: Fensterkontakt-Adressen
      description: Optionale Liste vorhandener MAX!-Fensterkontakte
