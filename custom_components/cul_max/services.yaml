export_topology:
  name: MAX!-Topologie exportieren
  description: >
    Exportiert die bekannte MAX!-Topologie als JSON-Datei. Enthalten sind alle
    bekannten Geräte, Gruppen-IDs, Link-Partner, Wochenprofile und virtuelle
    Kontakte.
  fields:
    path:
      name: Dateipfad
      description: >
        Optionaler JSON-Zielpfad. Relative Pfade werden unterhalb des
        Home-Assistant-Konfigurationsverzeichnisses gespeichert.
      selector:
        text:

import_topology:
  name: MAX!-Topologie importieren
  description: >
    Importiert eine zuvor exportierte MAX!-Topologie aus einer JSON-Datei oder
    direkt aus einem JSON-String. Die erste Version arbeitet bewusst schonend:
    vorhandene Geräte werden aktualisiert, fehlende virtuelle Kontakte können
    angelegt werden, unbekannte physische Geräte werden jedoch nicht erzeugt.
  fields:
    path:
      name: Dateipfad
      description: >
        Optionaler JSON-Quellpfad. Relative Pfade werden relativ zum
        Home-Assistant-Konfigurationsverzeichnis aufgeloest.
      selector:
        text:
    topology_json:
      name: Topologie-JSON
      description: Alternativ das komplette Export-JSON direkt einfuegen
      selector:
        text:
          multiline: true
    create_virtual_devices:
      name: Virtuelle Kontakte anlegen
      description: Erstellt fehlende virtuelle MAX!-Fensterkontakte aus dem Backup
      selector:
        boolean:
    update_names:
      name: Namen uebernehmen
      description: Uebernimmt gespeicherte Geraetenamen sowie Serien- und Firmwaredaten
      selector:
        boolean:
    apply_group_ids:
      name: Gruppen-IDs anwenden
      description: Spielt gespeicherte MAX!-Gruppen-IDs wieder ein
      selector:
        boolean:
    apply_links:
      name: Link-Partner anwenden
      description: Spielt gespeicherte On-Device-Assoziationen wieder ein
      selector:
        boolean:
    apply_week_profiles:
      name: Wochenprofile anwenden
      description: Spielt gespeicherte Wochenprofile fuer Klima-Geraete wieder ein
      selector:
        boolean:

cleanup_superseded_devices:
  name: Ersetzte Geraete aufraeumen
  description: >
    Entfernt zuvor als ersetzt markierte Altgeraete aus dem internen cul_max-Bestand.
    Optional koennen auch die zugehoerigen Entity- und Device-Registry-Eintraege
    aus Home Assistant mit entfernt werden. Standardmaessig laeuft der Service
    zuerst als Dry-Run und loggt nur, was aufgeraeumt wuerde.
  fields:
    dry_run:
      name: Nur pruefen
      description: Wenn aktiv, werden nur die Kandidaten geloggt und nichts geloescht
      selector:
        boolean:
    remove_registry_entries:
      name: Registry-Eintraege entfernen
      description: Entfernt zugehoerige Entity- und Device-Registry-Eintraege aus HA
      selector:
        boolean:
    remove_discovered_devices:
      name: Entdeckte Geraete entfernen
      description: Entfernt auch als entdeckt markierte, nicht gekoppelte Altgeraete
      selector:
        boolean:
